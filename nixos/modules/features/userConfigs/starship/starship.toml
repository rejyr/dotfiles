"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

continuation_prompt = "[.](bright-black) "

[character]
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[<](bold green)"
vimcmd_visual_symbol = "[<](bold yellow)"
vimcmd_replace_symbol = "[<](bold purple)"
vimcmd_replace_one_symbol = "[<](bold purple)"

[directory]
fish_style_pwd_dir_length = 1
truncation_length = 1
read_only = " ro"

[git_commit]
tag_symbol = " tag "

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)( $ahead_behind$stashed)]($style) "
style = "cyan"
# conflicted = "="
# untracked = "?"
# modified = "!"
# staged = "+"
# stashed = '\$'
# renamed = "r"
# deleted = "x"
conflicted = "​"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = "="

ahead = ">"
behind = "<"
diverged = "<>"


[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"
symbol = "git "
truncation_symbol = "..."

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
symbol = "py "

[aws]
symbol = "aws "

[azure]
symbol = "az "

